services:
  postgres:
    image: postgres:15
    container_name: resiflow_postgres
    restart: always
    environment:
      POSTGRES_DB: resiflow_db
      POSTGRES_USER: resiflow_user
      POSTGRES_PASSWORD: resiflow_pass
    volumes:
      - resiflow_pgdata:/var/lib/postgresql/data

volumes:
  resiflow_pgdata:
